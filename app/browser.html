<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Chart Mage - Draw sequence diagrams and flowcharts at lightning speed.">

    <title>Chart Mage - Draw sequence diagrams and flowcharts at lightning speed.</title>

    <link rel="icon" href="images/favicon.png">
    <link rel="stylesheet" href="css/design-tokens.css">

    <style type="text/css">
      html,
      body {
        min-height: 100%;
        margin: 0;
      }
      body {
        font-family: var(--font-sans);
        font-feature-settings: var(--font-feature-settings);
        font-weight: var(--font-weight-light);
        background:
          radial-gradient(circle at top left, rgba(249, 107, 238, 0.18), transparent 26%),
          radial-gradient(circle at top right, rgba(83, 58, 253, 0.16), transparent 24%),
          linear-gradient(180deg, #ffffff 0%, var(--color-bg) 100%);
        color: var(--color-text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .browser-card {
        width: min(780px, 100%);
        padding: 32px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow-elevated);
        text-align: center;
      }
      h1 {
        font-weight: var(--font-weight-light);
        font-size: clamp(34px, 5vw, 52px);
        line-height: 1.02;
        letter-spacing: -0.04em;
        color: var(--color-heading);
        margin: 0 0 18px;
      }
      p {
        font-size: 18px;
        line-height: 1.55;
        margin: 0;
      }
      a {
        color: var(--color-brand);
      }
      div {
        margin-top: 24px;
      }
      .thin {
        color: var(--color-text-muted);
        margin-top: 14px;
        font-size: 14px;
      }
      img {
        width: min(560px, 100%);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
      }
    </style>

    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

      ga('create', 'UA-86337828-1', 'auto');
      ga('send', 'pageview');
    </script>
  </head>

  <body>
    <div class="browser-card">
      <h1>Chart Mage leaves IE behind.</h1>
      <p>Chart Mage depends on modern browser features that Internet Explorer never shipped. Please open it in the latest version of <a href="http://www.google.com/chrome/">Chrome</a> or <a href="http://www.firefox.com">Firefox</a>.</p>
      <div class="kitten">
        <img src="images/cat.jpg">
        <p class="thin">The diagrams will still be here when you come back with a modern browser.</p>
      </div>
    </div>
  </body>
</html>
